<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Магазин футболок</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Магазин футболок</h1>
  <p>Стильные вещи для тебя</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="tshirt">
    <h2>Black Street</h2>
    <p class="price">25€</p>
    <a class="btn" href="#">Купить</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="tshirt">
    <h2>White Minimal</h2>
    <p class="price">20€</p>
    <a class="btn" href="#">Купить</a>
  </div>

</div>

<footer class="footer">
  © 2026 Tshirt Shop
</footer>

</body>
</html>
